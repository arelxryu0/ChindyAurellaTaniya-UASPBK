<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Menu</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .menu-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      max-height: 80vh;
      overflow-y: auto;
      padding-right: 10px;
    }

    .menu-card {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(15, 15, 15, 0.1);
      width: 200px;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .menu-card:hover {
      transform: translateY(-5px);
    }

    .menu-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }

    .menu-card p {
      margin: 10px 0;
      font-weight: bold;
      color: #000000;
    }

    .btn-container {
      display: flex;
      justify-content: space-between;
      gap: 5px;
    }

    .btn {
      flex: 1;
    }

    #darkToggle {
      position: fixed;
      top: 15px;
      right: 15px;
      background-color: #ddd;
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      transition: background 0.3s ease;
    }

    .search-box {
      margin-bottom: 20px;
    }

    .search-box input {
      padding: 10px;
      width: 300px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #aaa;
    }

    body.dark-mode {
      background-color: #050505;
      color: #f0f0f0;
    }

    body.dark-mode .main {
      background-color: #887b7b;
    }

    body.dark-mode .menu-card {
      background-color: #3a3a3a;
      color: #f0f0f0;
    }

    body.dark-mode .menu-card p {
      color: #f0f0f0;
    }

    body.dark-mode .btn {
      background-color: #3d3a47;
      color: white;
    }

    body.dark-mode .btn:hover {
      background-color: #535258;
    }

    body.dark-mode .sidebar {
      background-color: #000;
    }
  </style>
</head>
<body>
  <button id="darkToggle">🌓</button>

  <div class="sidebar">
    <img src="img/logo.png" class="sidebar-logo">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">Profile</a>
    <a href="pesanan.html">Pesanan</a>
    <a href="menu.html" class="active">Menu</a>
    <a href="index.html">Logout</a>
  </div>

  <div class="main brown-bg">
    <h2>Menu Makanan</h2>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari menu...">
    </div>
    <div class="menu-grid" id="menuGrid">
      <!-- Menu cards dimuat lewat JS -->
    </div>
  </div>

  <script>
    const daftarMenu = [
      { nama: "Soto Ayam", harga: 20000, gambar: "soto.png" },
      { nama: "Siomay Bandung", harga: 15000, gambar: "siomay.png" },
      { nama: "Risol Mayo", harga: 10000, gambar: "risol.png" },
      { nama: "Cilok Bumbu Kacang", harga: 8000, gambar: "cilok.png" },
      { nama: "Nasi Kuning", harga: 17000, gambar: "nasikuning.png" },
      { nama: "Bakso Urat", harga: 18000, gambar: "bakso.png" },
      { nama: "Rawon Daging", harga: 23000, gambar: "rawon.png" },
      { nama: "Ayam Geprek", harga: 22000, gambar: "ayamgeprek.png" },
      { nama: "Nasi Goreng", harga: 18000, gambar: "nasigoreng.png" },
      { nama: "Ayam Bakar", harga: 24000, gambar: "ayambakar.png" }
    ];

    function renderMenu(menuList) {
      const grid = document.getElementById("menuGrid");
      grid.innerHTML = "";
      menuList.forEach(item => {
        const card = document.createElement("div");
        card.className = "menu-card";
        card.innerHTML = `
          <img src="img/${item.gambar}" alt="${item.nama}">
          <p>${item.nama}<br><strong>Rp ${item.harga.toLocaleString()}</strong></p>
          <div class="btn-container">
            <button class="btn tambah">Tambah</button>
            <button class="btn hapus-item">Hapus</button>
          </div>
        `;

        card.querySelector(".btn.tambah").addEventListener("click", () => {
          tambahPesanan(item.nama, item.harga);
          window.location.href = "pesanan.html";
        });

        card.querySelector(".btn.hapus-item").addEventListener("click", () => {
          card.remove();
        });

        grid.appendChild(card);
      });
    }

    function tambahPesanan(nama, harga) {
      let pesanan = JSON.parse(localStorage.getItem('pesanan')) || [];
      let index = pesanan.findIndex(item => item.nama === nama);

      if (index !== -1) {
        pesanan[index].jumlah += 1;
      } else {
        pesanan.push({ nama: nama, harga: harga, jumlah: 1 });
      }

      localStorage.setItem('pesanan', JSON.stringify(pesanan));
      alert(`Berhasil menambah ${nama} ke pesanan!`);
    }

    document.getElementById("searchInput").addEventListener("input", function() {
      const keyword = this.value.toLowerCase();
      const hasil = daftarMenu.filter(item => item.nama.toLowerCase().includes(keyword));
      renderMenu(hasil);
    });

    // Mode gelap saat halaman dibuka
    const toggleBtn = document.getElementById('darkToggle');
    if (localStorage.getItem('mode') === 'dark') {
      document.body.classList.add('dark-mode');
    }
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const mode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      localStorage.setItem('mode', mode);
    });

    renderMenu(daftarMenu);
  </script>
</body>
</html>
