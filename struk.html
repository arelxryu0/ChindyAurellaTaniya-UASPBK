<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Struk Pesanan</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .main {
      padding: 30px;
      max-width: 600px;
      background-color: #6d2c2c;
      border-radius: 10px;
      margin: 40px auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      font-family: sans-serif;
    }

    h2 {
      margin-bottom: 10px;
    }

    .struk-item {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    #total {
      font-weight: bold;
      margin-top: 20px;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }

    .back-btn {
      margin-top: 30px;
      display: inline-block;
      padding: 10px 20px;
      background-color: #4a4a4a;
      color: white;
      border: none;
      border-radius: 6px;
      text-decoration: none;
    }

    body.dark-mode {
      background-color: #1e1e1e;
      color: #be5e5e;
    }

    body.dark-mode .main {
      background-color: #2c2c2c;
    }

    body.dark-mode .struk-item,
    body.dark-mode #total {
      color: #b47878;
    }

    .date {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    body.dark-mode .date {
      color: #c07171;
    }
  </style>
</head>
<body>
  <div class="main">
    <h2>Struk Pembelian</h2>
    <div class="date" id="waktu-checkout"></div>
    <div id="daftar-struk"></div>
    <div id="total"></div>
    <a href="dashboard.html" class="back-btn">Kembali ke Dashboard</a>
  </div>

  <script>
    const struk = JSON.parse(localStorage.getItem('strukTerakhir'));
    const daftar = document.getElementById('daftar-struk');
    const totalDiv = document.getElementById('total');
    const waktuDiv = document.getElementById('waktu-checkout');

    if (struk && struk.pesanan.length > 0) {
      let total = 0;
      waktuDiv.innerText = "Waktu Checkout: " + struk.waktu;

      struk.pesanan.forEach(item => {
        const row = document.createElement('div');
        row.className = 'struk-item';
        row.innerHTML = `
          <span>${item.nama} x${item.jumlah}</span>
          <span>Rp ${(item.harga * item.jumlah).toLocaleString()}</span>
        `;
        daftar.appendChild(row);
        total += item.harga * item.jumlah;
      });

      totalDiv.innerText = "Total Bayar: Rp " + total.toLocaleString();
    } else {
      daftar.innerHTML = "<p>Tidak ada data struk.</p>";
      totalDiv.style.display = "none";
    }

    // Dark mode
    if (localStorage.getItem('mode') === 'dark') {
      document.body.classList.add('dark-mode');
    }
  </script>
</body>
</html>
