<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .main {
      position: relative;
      padding: 20px;
    }

    .promo {
      position: absolute;
      top: 20px;
      right: 30px;
      background-color: #858371;
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .menu-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 60px;
    }

    .menu-card {
      background: rgb(221, 210, 210);
      padding: 15px;
      border-radius: 10px;
      width: 180px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(107, 76, 76, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 270px;
      transition: transform 0.2s;
    }

    .menu-card:hover {
      transform: translateY(-5px);
    }

    .menu-card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    .menu-card p {
      margin: 10px 0;
      flex-grow: 1;
    }

    /* Tombol Dark Mode */
    #darkToggle {
      position: fixed;
      top: 15px;
      right: 15px;
      background-color: #ddd;
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(43, 32, 32, 0.2);
      transition: background 0.3s ease;
    }

    /* Dark Mode Styles */
    body.dark-mode {
      background-color: #1e1e1e;
      color: #f0f0f0;
    }

    body.dark-mode .main {
      background-color: #695151;
    }

    body.dark-mode .menu-card {
      background-color: #3a1e1e;
      color: #f0f0f0;
    }

    body.dark-mode .menu-card img {
      opacity: 0.95;
    }

    body.dark-mode .promo {
      background-color: #444;
      color: #ebe3e3;
    }

    body.dark-mode .sidebar {
      background-color: #000;
    }

    body.dark-mode .btn {
      background-color: #171836;
      color: #f1e5e5;
    }
  </style>
</head>
<body>
  <button id="darkToggle">🌓</button>

  <div class="sidebar">
    <img src="img/logo.png" alt="Logo" class="sidebar-logo">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="profile.html">Profile</a>
    <a href="pesanan.html">Pesanan</a>
    <a href="menu.html">Menu</a>
    <a href="index.html">Logout</a>
  </div>

  <div class="main brown-bg">
    <h2>Halo Chindy!</h2>
    <div class="promo">Promo: Free Teh Es jika makan di atas Rp 15.000</div>

    <div class="menu-grid">
      <div class="menu-card">
        <img src="img/rawon.png" alt="Rawon">
        <p>Rawon Malang<br><strong>Rp 23.000</strong></p>
        <button class="btn tambah">Tambah</button>
      </div>
      <div class="menu-card">
        <img src="img/bakso.png" alt="Bakso">
        <p>Bakso<br><strong>Rp 18.000</strong></p>
        <button class="btn tambah">Tambah</button>
      </div>
      <div class="menu-card">
        <img src="img/nasikuning.png" alt="Nasi Kuning">
        <p>Nasi Kuning<br><strong>Rp 17.000</strong></p>
        <button class="btn tambah">Tambah</button>
      </div>
      <div class="menu-card">
        <img src="img/ayamgeprek.png" alt="Ayam Geprek">
        <p>Ayam Geprek<br><strong>Rp 22.000</strong></p>
        <button class="btn tambah">Tambah</button>
      </div>
    </div>
  </div>

  <script>
    // Tombol tambah redirect ke pesanan.html
    document.querySelectorAll('.btn.tambah').forEach(btn => {
      btn.addEventListener('click', () => window.location.href = 'pesanan.html');
    });

    // Dark mode toggle dan simpan ke localStorage
    const toggleBtn = document.getElementById('darkToggle');
    if (localStorage.getItem('mode') === 'dark') {
      document.body.classList.add('dark-mode');
    }

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const mode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      localStorage.setItem('mode', mode);
    });
  </script>
</body>
</html>
