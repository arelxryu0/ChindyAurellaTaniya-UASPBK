<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .profile-container {
      padding: 30px 50px;
    }

    h2 {
      margin-bottom: 20px;
      color: #000;
    }

    .profile-form label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      color: black;
    }

    .profile-form input {
      padding: 10px;
      width: 100%;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #999;
      background-color: #eeeeee;
      color: #000;
      font-size: 16px;
    }

    .profile-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    /* Tombol Dark Mode */
    #darkToggle {
      position: fixed;
      top: 15px;
      right: 15px;
      background-color: #ddd;
      border: none;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: background 0.3s ease;
    }

    /* Dark Mode Styles */
    body.dark-mode {
      background-color: #1e1e1e;
      color: #f0f0f0;
    }

    body.dark-mode .main {
      background-color: #2b2b2b;
    }

    body.dark-mode .profile-form label {
      color: #f0f0f0;
    }

    body.dark-mode .profile-form input {
      background-color: #444;
      color: #f0f0f0;
      border: 1px solid #888;
    }

    body.dark-mode .btn {
      background-color: #5c5c5c;
      color: white;
    }

    body.dark-mode .btn:hover {
      background-color: #777;
    }

    body.dark-mode .sidebar {
      background-color: #000;
    }
  </style>
</head>
<body>
  <button id="darkToggle">🌓</button>

  <div class="sidebar">
    <img src="img/logo.png" alt="Logo" class="sidebar-logo">
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html" class="active">Profile</a>
    <a href="pesanan.html">Pesanan</a>
    <a href="menu.html">Menu</a>
    <a href="index.html">Logout</a>
  </div>

  <div class="main brown-bg profile-container">
    <h2>Profile Pengguna</h2>
    <form class="profile-form">
      <label for="nama">Nama:</label>
      <input type="text" id="nama" value="Bunga Cinta" disabled>

      <label for="nim">NPM:</label>
      <input type="text" id="nim" value="12345678" disabled>

      <label for="kelas">Kelas:</label>
      <input type="text" id="kelas" value="TI-1A" disabled>

      <div class="profile-buttons">
        <button type="button" class="btn" id="editBtn">Edit Profil</button>
        <button type="button" class="btn" id="saveBtn" style="display:none;">Simpan</button>
        <button type="button" class="btn" id="hapusBtn">Hapus Akun</button>
      </div>
    </form>
  </div>

  <script>
    const namaInput = document.getElementById('nama');
    const nimInput = document.getElementById('nim');
    const kelasInput = document.getElementById('kelas');
    const editBtn = document.getElementById('editBtn');
    const saveBtn = document.getElementById('saveBtn');

    editBtn.addEventListener('click', () => {
      namaInput.disabled = false;
      nimInput.disabled = false;
      kelasInput.disabled = false;
      editBtn.style.display = 'none';
      saveBtn.style.display = 'inline-block';
    });

    saveBtn.addEventListener('click', () => {
      namaInput.disabled = true;
      nimInput.disabled = true;
      kelasInput.disabled = true;
      editBtn.style.display = 'inline-block';
      saveBtn.style.display = 'none';
      alert('Profil berhasil disimpan!');
    });

    document.getElementById('hapusBtn').addEventListener('click', () => {
      if (confirm("Apakah yakin ingin menghapus akun?")) {
        alert("Akun berhasil dihapus!");
        window.location.href = "index.html";
      }
    });

    // Dark Mode Persistence
    const toggleBtn = document.getElementById('darkToggle');
    if (localStorage.getItem('mode') === 'dark') {
      document.body.classList.add('dark-mode');
    }

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const mode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      localStorage.setItem('mode', mode);
    });
  </script>
</body>
</html>
